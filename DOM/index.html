    <div class="mobiles">
        <p>Samsung S24</p>
    </div>

    <button onclick="handleAddMobiles()">Add Mobiles</button>

    <script>

       function handleAddMobiles(){
            const databaseData = [
                {
                    name : "Apple Iphone 13",
                    price: '$999',
                },
                {
                    name : "Apple Iphone 14",
                    age : "$1099",
                }]

            const mobilesContainer = document.querySelector(".mobiles")

            for(var i = 0; i < databaseData.length; i++){
                const mobile = `<p>${databaseData[i].name}</p>`
                mobilesContainer.innerHTML += mobile
            }
        
       }
